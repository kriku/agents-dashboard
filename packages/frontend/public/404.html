<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Redirecting…</title>
    <script>
      // GitHub Pages SPA redirect: preserve path for client-side router
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/agents-dashboard/' +
        '?p=' + encodeURIComponent(path.replace('/agents-dashboard/', ''))
      );
    </script>
  </head>
  <body></body>
</html>
