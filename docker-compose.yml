services:
  clickhouse:
    image: clickhouse/clickhouse-server:24.3
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse-data:/var/lib/clickhouse
      - ./packages/clickhouse/init:/docker-entrypoint-initdb.d
      - ./packages/clickhouse/config/allow-remote.xml:/etc/clickhouse-server/users.d/allow-remote.xml:ro
    environment:
      CLICKHOUSE_DB: agent_monitor
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ""
    deploy:
      resources:
        limits:
          memory: 2g
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:8123/ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  bff:
    build:
      context: .
      dockerfile: packages/bff/Dockerfile
    ports:
      - "3001:3001"
    environment:
      BFF_PORT: "3001"
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DB: agent_monitor
      JWT_SECRET: dev-secret
    depends_on:
      clickhouse:
        condition: service_healthy

  frontend:
    build:
      context: .
      dockerfile: packages/frontend/Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - bff

volumes:
  clickhouse-data:
